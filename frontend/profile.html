<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="profile-title">My Profile</h1>

<div class="profile-box">

   <div class="profile-image-container">

    <img 
        id="profileImage"
        class="profile-image"
        src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
    >

</div>

<br>

        <h2 id="profileName"></h2>

        <p id="profileEmail"></p>

        <p>
            Followers: <span id="followersCount">0</span>
        </p>

        <p>
            Following: <span id="followingCount">0</span>
        </p>

    </div>

    <h2 class="posts-title">My Posts</h2>

    <div id="myPosts"></div>

    <br>

    <a href="index.html">
       <button class="back-btn">Back to Feed</button>
    </a>

    <!-- IMPORTANT -->
    <script src="profile.js"></script>

</body>
</html>
